function getAchData() {
    if (currentUser) return currentUser.achievements || {};
    return JSON.parse(localStorage.getItem('snakeGuestAch') || '{}');
}

function saveAchData(d) {
    if (currentUser) { currentUser.achievements = d; } else { localStorage.setItem('snakeGuestAch', JSON.stringify(d)); }
}

function checkAchievements(dt = null) {
    const s = getStats();
    const ach = getAchData();
    let upd = false;
    if (!s.bonusEvents) s.bonusEvents = 0;
    if (!s.rainbowEvents) s.rainbowEvents = 0;
    if (!s.goldenEvents) s.goldenEvents = 0;
    if (!s.attackEvents) s.attackEvents = 0;
    if (!s.selfDeaths) s.selfDeaths = 0;
    if (!s.wallDeaths) s.wallDeaths = 0;
    if (dt === 'self') s.selfDeaths++;
    if (dt === 'wall') s.wallDeaths++;
    s.totalEvents = s.totalEvents || 0;
    
    ACHIEVEMENTS.forEach(a => {
        if (ach[a.id]) return;
        if (a.condition(s)) {
            ach[a.id] = 'completed';
            upd = true;
            showAchToast(a);
        }
    });
    
    if (upd) { saveAchData(ach); saveStats(s); renderAchievements(); }
}

function showAchToast(a) {
    const t = document.createElement('div');
    t.className = 'achievement-toast';
    t.innerHTML = '<div class="achievement-toast-title">' + a.icon + ' ' + a.name + '</div><div class="achievement-toast-reward">Награда: ' + formatReward(a.reward) + '</div>';
    document.body.appendChild(t);
    setTimeout(() => { t.style.opacity = '0'; t.style.transition = '0.5s'; setTimeout(() => t.remove(), 500); }, 5000);
}

function formatReward(r) {
    if (r.type === 'apples') return r.amount + '🍎';
    if (r.type === 'goldApples') return r.amount + '⭐';
    if (r.type === 'spark') { const n = { golden: 'Золотая еда', rainbow: 'Радужный дождь', bonus: 'Бонусная еда', random: 'Рандом' }; return r.amount + '🕯️ ' + n[r.sparkType]; }
    return '';
}

async function claimAchievement(id) {
    const ach = getAchData();
    if (ach[id] !== 'completed') return;
    const a = ACHIEVEMENTS.find(x => x.id === id);
    if (!a) return;
    const s = getStats();
    const sp = getSparks();
    if (a.reward.type === 'apples') s.applesEaten += a.reward.amount;
    if (a.reward.type === 'goldApples') s.goldApplesEaten += a.reward.amount;
    if (a.reward.type === 'spark') { sp[a.reward.sparkType] = (sp[a.reward.sparkType] || 0) + a.reward.amount; saveSparks(sp); }
    ach[id] = 'claimed';
    saveAchData(ach);
    saveStats(s);
    if (currentUser) { try { await sb.from('players').update({ achievements: ach }).eq('username', currentUser.username); } catch (e) {} }
    updateStatsDisplay();
    updateSparkBalance();
    updateSparkButtons();
    renderAchievements();
    alert('✅ ' + formatReward(a.reward));
}

function renderAchievements() {
    const g = document.getElementById('achievementsGrid');
    const ach = getAchData();
    g.innerHTML = ACHIEVEMENTS.map(a => {
        const s = ach[a.id] || 'locked';
        return '<div class="achievement-card ' + (s === 'completed' ? 'completed' : '') + ' ' + (s === 'claimed' ? 'claimed' : '') + '"><div class="achievement-icon">' + a.icon + '</div><div class="achievement-name">' + a.name + '</div><div class="achievement-desc">' + a.desc + '</div><div class="achievement-reward">' + formatReward(a.reward) + '</div>' + (s === 'completed' ? '<button class="achievement-claim-btn" onclick="claimAchievement(\'' + a.id + '\')">Забрать ✅</button>' : s === 'claimed' ? '<div style="font-size:11px;color:#999">Получено ✔️</div>' : '<div style="font-size:11px;color:#999">🔒</div>') + '</div>';
    }).join('');
}

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreText = document.getElementById('score');
const size = 20;
const tileCount = canvas.width / size;

let snake = [{x: 10, y: 10}];
let food = {x: 5, y: 5};
let bonusFoods = [];
let goldenActive = false;
let dx = 1, dy = 0, score = 0, isGameOver = false, gameLoopInterval = null, baseSpeed = 100, currentSpeed = 100;
let eventActive = false, eventType = null, eventEndTime = 0, manualEvent = false, rainbowApples = [], rainbowInterval = null;
let attackBalls = [], attackInterval = null;
let sessionGoldApples = 0, sessionEvents = 0, deathType = null;

// Скрытые переменные для защиты от читов
let _st = 0; // game start time
let _sh = []; // score history

function drawGame() {
    if (isGameOver) return;
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    const head = {x: snake[0].x + dx, y: snake[0].y + dy};
    snake.unshift(head);
    let ate = false;
    
    if (head.x === food.x && head.y === food.y && !attackBalls.some(b => b.x === food.x && b.y === food.y)) {
        ate = true;
        if (goldenActive) {
            for (let i = 0; i < 3; i++) snake.push({...snake[snake.length - 1]});
            score += 3;
            updateStat('goldApplesEaten', 1);
            sessionGoldApples++;
        } else {
            score++;
        }
        updateStat('applesEaten', 1);
        scoreText.textContent = 'Счёт: ' + score;
        currentSpeed = Math.max(40, baseSpeed - score * 0.5);
        restartGameLoop();
        generateFood();
        if (!manualEvent) checkRandomEvent();
        updateSparkBalance();
    }
    
    for (let i = bonusFoods.length - 1; i >= 0; i--) {
        if (head.x === bonusFoods[i].x && head.y === bonusFoods[i].y) {
            ate = true;
            score++;
            updateStat('applesEaten', 1);
            scoreText.textContent = 'Счёт: ' + score;
            currentSpeed = Math.max(40, baseSpeed - score * 0.5);
            restartGameLoop();
            bonusFoods.splice(i, 1);
        }
    }
    
    for (let i = rainbowApples.length - 1; i >= 0; i--) {
        if (head.x === rainbowApples[i].x && head.y === rainbowApples[i].y) {
            ate = true;
            score++;
            updateStat('applesEaten', 1);
            updateStat('goldApplesEaten', 1);
            sessionGoldApples++;
            scoreText.textContent = 'Счёт: ' + score;
            currentSpeed = Math.max(40, baseSpeed - score * 0.5);
            restartGameLoop();
            rainbowApples.splice(i, 1);
        }
    }
    
    for (let i = attackBalls.length - 1; i >= 0; i--) {
        const b = attackBalls[i];
        if (head.x === b.x && head.y === b.y) {
            if (b.active) { deathType = 'attack'; endGame(); return; }
            else {
                ate = true;
                score += 4;
                for (let j = 0; j < 4; j++) updateStat('applesEaten', 1);
                scoreText.textContent = 'Счёт: ' + score;
                currentSpeed = Math.max(40, baseSpeed - score * 0.5);
                restartGameLoop();
                attackBalls.splice(i, 1);
            }
        }
    }
    
    if (!ate) snake.pop();
    
    if (head.x < 0 || head.y < 0 || head.x >= tileCount || head.y >= tileCount) { deathType = 'wall'; endGame(); return; }
    for (let i = 1; i < snake.length; i++) { if (head.x === snake[i].x && head.y === snake[i].y) { deathType = 'self'; endGame(); return; } }
    
    ctx.fillStyle = goldenActive ? "#FFD700" : "red";
    if (!attackBalls.some(b => b.x === food.x && b.y === food.y)) ctx.fillRect(food.x * size, food.y * size, size, size);
    
    ctx.fillStyle = "#00BFFF";
    bonusFoods.forEach(bf => ctx.fillRect(bf.x * size, bf.y * size, size, size));
    
    rainbowApples.forEach(ra => {
        const g = ctx.createRadialGradient(ra.x * size + size/2, ra.y * size + size/2, 2, ra.x * size + size/2, ra.y * size + size/2, size/2);
        g.addColorStop(0, "#FFD700"); g.addColorStop(0.5, "#FF6B6B"); g.addColorStop(1, "#FF4500");
        ctx.fillStyle = g;
        ctx.fillRect(ra.x * size, ra.y * size, size, size);
    });
    
    attackBalls.forEach(b => {
        ctx.fillStyle = b.active ? "#4488FF" : "#FF4444";
        ctx.beginPath();
        ctx.arc(b.x * size + size/2, b.y * size + size/2, size/2 - 2, 0, Math.PI * 2);
        ctx.fill();
    });
    
    const skinColor = getCurrentSkinColor();
    snake.forEach((p, i) => {
        ctx.fillStyle = i === 0 ? skinColor : darkenColor(skinColor, 0.7 - (i * 0.02));
        ctx.fillRect(p.x * size, p.y * size, size - 2, size - 2);
    });
    
    updateEventTimer();
}

function darkenColor(hex, f) {
    let r = 0, g = 0, b = 0;
    if (hex.startsWith('#')) {
        r = parseInt(hex.slice(1, 3), 16);
        g = parseInt(hex.slice(3, 5), 16);
        b = parseInt(hex.slice(5, 7), 16);
    }
    return 'rgb(' + Math.floor(r * f) + ',' + Math.floor(g * f) + ',' + Math.floor(b * f) + ')';
}

function generateFood() {
    if (eventType !== 'golden') goldenActive = false;
    let p, a = 0;
    do { p = {x: Math.floor(Math.random() * tileCount), y: Math.floor(Math.random() * tileCount)}; a++; if (a > 200) break; }
    while (isOccupied(p) || attackBalls.some(b => b.x === p.x && b.y === p.y));
    food = p;
}

function isOccupied(p) {
    return snake.some(s => s.x === p.x && s.y === p.y) || (food.x === p.x && food.y === p.y) || bonusFoods.some(bf => bf.x === p.x && bf.y === p.y) || rainbowApples.some(ra => ra.x === p.x && ra.y === p.y);
}

function checkRandomEvent() {
    if (eventActive) return;
    const r = Math.random() * 100;
    if (r < 1) startEvent('golden');
    else if (r < 6) startEvent('bonus');
    else if (r < 9) startEvent('rainbow');
    else if (r < 10.5) startEvent('attack');
}

function startEvent(type, dur = null) {
    eventActive = true;
    eventType = type;
    manualEvent = (dur !== null);
    if (!manualEvent) {
        updateStat('eventsEncountered', 1);
        sessionEvents++;
        const s = getStats();
        if (type === 'bonus') s.bonusEvents = (s.bonusEvents || 0) + 1;
        if (type === 'rainbow') s.rainbowEvents = (s.rainbowEvents || 0) + 1;
        if (type === 'golden') s.goldenEvents = (s.goldenEvents || 0) + 1;
        if (type === 'attack') s.attackEvents = (s.attackEvents || 0) + 1;
        if (!s.totalEvents) s.totalEvents = 0;
        s.totalEvents++;
        saveStats(s);
        checkAchievements();
    }
    eventDuration = type === 'attack' ? (dur || 20000) : (dur || (5000 + Math.random() * 7000));
    eventEndTime = Date.now() + eventDuration;
    document.getElementById('eventTimer').style.display = 'flex';
    if (type === 'golden') { goldenActive = true; document.getElementById('eventIcon').textContent = '⭐'; document.getElementById('eventName').textContent = 'Золотая еда!'; }
    else if (type === 'bonus') { document.getElementById('eventIcon').textContent = '🎁'; document.getElementById('eventName').textContent = 'Бонусная еда!'; bonusFoods = []; for (let i = 0; i < 3; i++) { let p; do { p = {x: Math.floor(Math.random() * tileCount), y: Math.floor(Math.random() * tileCount)}; } while (isOccupied(p)); bonusFoods.push(p); } }
    else if (type === 'rainbow') { document.getElementById('eventIcon').textContent = '🌈'; document.getElementById('eventName').textContent = 'Радужный дождь!'; startRainbowRain(); }
    else if (type === 'attack') { document.getElementById('eventIcon').textContent = '💀'; document.getElementById('eventName').textContent = 'Атака!'; startAttackEvent(); }
    updateEventTimer();
}

function endEvent() {
    if (eventType === 'attack') { attackBalls.forEach(b => b.active = false); setTimeout(() => { attackBalls = []; }, 10000); }
    eventActive = false; eventType = null; goldenActive = false; bonusFoods = []; manualEvent = false;
    if (rainbowInterval) { clearInterval(rainbowInterval); rainbowInterval = null; }
    rainbowApples = [];
    if (attackInterval) { clearInterval(attackInterval); attackInterval = null; }
    document.getElementById('eventTimer').style.display = 'none';
}

function updateEventTimer() {
    if (!eventActive) return;
    const rem = Math.max(0, eventEndTime - Date.now());
    document.getElementById('eventCountdown').textContent = Math.ceil(rem / 1000) + 'с';
    if (rem <= 0) endEvent();
}

function startRainbowRain() {
    rainbowApples = [];
    rainbowInterval = setInterval(() => {
        if (!eventActive || eventType !== 'rainbow') { clearInterval(rainbowInterval); rainbowInterval = null; return; }
        const a = {x: Math.floor(Math.random() * tileCount), y: 0};
        if (!isOccupied(a)) rainbowApples.push(a);
        for (let i = rainbowApples.length - 1; i >= 0; i--) {
            rainbowApples[i].y++;
            if (rainbowApples[i].y >= tileCount) { rainbowApples.splice(i, 1); continue; }
            if (snake[0].x === rainbowApples[i].x && snake[0].y === rainbowApples[i].y) {
                score++; updateStat('applesEaten', 1); updateStat('goldApplesEaten', 1); sessionGoldApples++;
                scoreText.textContent = 'Счёт: ' + score;
                currentSpeed = Math.max(40, baseSpeed - score * 0.5);
                restartGameLoop();
                rainbowApples.splice(i, 1);
            }
        }
    }, 300);
}

function startAttackEvent() {
    attackBalls = [];
    for (let i = 0; i < 5; i++) {
        const p = {x: Math.floor(Math.random() * tileCount), y: Math.floor(Math.random() * tileCount)};
        attackBalls.push({x: p.x, y: p.y, dx: 0, dy: 0, active: true});
        if (Math.random() > 0.5) attackBalls[i].dx = Math.random() > 0.5 ? 1 : -1;
        else attackBalls[i].dy = Math.random() > 0.5 ? 1 : -1;
        if (attackBalls[i].dx === 0 && attackBalls[i].dy === 0) attackBalls[i].dx = 1;
    }
    attackInterval = setInterval(() => {
        if (!eventActive || eventType !== 'attack') { attackBalls.forEach(b => { b.dx = 0; b.dy = 0; }); return; }
        for (let b of attackBalls) {
            if (!b.active) continue;
            const h = snake[0];
            if (Math.abs(h.x - b.x) > Math.abs(h.y - b.y)) { b.dx = h.x > b.x ? 1 : -1; b.dy = 0; }
            else { b.dx = 0; b.dy = h.y > b.y ? 1 : -1; }
            if (Math.random() < 0.2) { if (b.dx !== 0) { b.dx = 0; b.dy = Math.random() > 0.5 ? 1 : -1; } else { b.dy = 0; b.dx = Math.random() > 0.5 ? 1 : -1; } }
            let nx = b.x + b.dx, ny = b.y + b.dy;
            if (nx < 0 || nx >= tileCount) b.dx *= -1;
            if (ny < 0 || ny >= tileCount) b.dy *= -1;
            b.x = Math.max(0, Math.min(tileCount - 1, b.x + b.dx));
            b.y = Math.max(0, Math.min(tileCount - 1, b.y + b.dy));
        }
    }, 200);
}

    endEvent();
    attackBalls = [];

    food = {x: 5, y: 5};
    bonusFoods = [];

rainbowApples.forEach(ra=>{const g=ctx.createRadialGradient(ra.x*size+size/2,ra.y*size+size/2,2,ra.x*size+size/2,ra.y*size+size/2,size/2);g.addColorStop(0,"#FFD700");g.addColorStop(0.5,"#FF6B6B");g.addColorStop(1,"#FF4500");ctx.fillStyle=g;ctx.fillRect(ra.x*size,ra.y*size,size,size);});
attackBalls.forEach(b=>{ctx.fillStyle=b.active?"#4488FF":"#FF4444";ctx.beginPath();ctx.arc(b.x*size+size/2,b.y*size+size/2,size/2-2,0,Math.PI*2);ctx.fill();});
const skinColor=getCurrentSkinColor();snake.forEach((p,i)=>{ctx.fillStyle=i===0?skinColor:darkenColor(skinColor,0.7-(i*0.02));ctx.fillRect(p.x*size,p.y*size,size-2,size-2);});
updateEventTimer();
}

function darkenColor(hex,f){let r=0,g=0,b=0;if(hex.startsWith('#')){r=parseInt(hex.slice(1,3),16);g=parseInt(hex.slice(3,5),16);b=parseInt(hex.slice(5,7),16);}return'rgb('+Math.floor(r*f)+','+Math.floor(g*f)+','+Math.floor(b*f)+')';}
function generateFood(){if(eventType!=='golden')goldenActive=false;let p,a=0;do{p={x:Math.floor(Math.random()*tileCount),y:Math.floor(Math.random()*tileCount)};a++;if(a>200)break;}while(isOccupied(p)||attackBalls.some(b=>b.x===p.x&&b.y===p.y));food=p;}
function isOccupied(p){return snake.some(s=>s.x===p.x&&s.y===p.y)||(food.x===p.x&&food.y===p.y)||bonusFoods.some(bf=>bf.x===p.x&&bf.y===p.y)||rainbowApples.some(ra=>ra.x===p.x&&ra.y===p.y);}
function checkRandomEvent(){if(eventActive)return;const r=Math.random()*100;if(r<1)startEvent('golden');else if(r<6)startEvent('bonus');else if(r<9)startEvent('rainbow');else if(r<10.5)startEvent('attack');}
function startEvent(type,dur=null){eventActive=true;eventType=type;manualEvent=(dur!==null);if(!manualEvent){updateStat('eventsEncountered',1);sessionEvents++;const s=getStats();if(type==='bonus')s.bonusEvents=(s.bonusEvents||0)+1;if(type==='rainbow')s.rainbowEvents=(s.rainbowEvents||0)+1;if(type==='golden')s.goldenEvents=(s.goldenEvents||0)+1;if(type==='attack')s.attackEvents=(s.attackEvents||0)+1;if(!s.totalEvents)s.totalEvents=0;s.totalEvents++;saveStats(s);checkAchievements();}eventDuration=type==='attack'?(dur||20000):(dur||(5000+Math.random()*7000));eventEndTime=Date.now()+eventDuration;document.getElementById('eventTimer').style.display='flex';if(type==='golden'){goldenActive=true;document.getElementById('eventIcon').textContent='⭐';document.getElementById('eventName').textContent='Золотая еда!';}else if(type==='bonus'){document.getElementById('eventIcon').textContent='🎁';document.getElementById('eventName').textContent='Бонусная еда!';bonusFoods=[];for(let i=0;i<3;i++){let p;do{p={x:Math.floor(Math.random()*tileCount),y:Math.floor(Math.random()*tileCount)};}while(isOccupied(p));bonusFoods.push(p);}}else if(type==='rainbow'){document.getElementById('eventIcon').textContent='🌈';document.getElementById('eventName').textContent='Радужный дождь!';startRainbowRain();}else if(type==='attack'){document.getElementById('eventIcon').textContent='💀';document.getElementById('eventName').textContent='Атака!';startAttackEvent();}updateEventTimer();}
function endEvent(){if(eventType==='attack'){attackBalls.forEach(b=>b.active=false);setTimeout(()=>{attackBalls=[];},10000);}eventActive=false;eventType=null;goldenActive=false;bonusFoods=[];manualEvent=false;if(rainbowInterval){clearInterval(rainbowInterval);rainbowInterval=null;}rainbowApples=[];if(attackInterval){clearInterval(attackInterval);attackInterval=null;}document.getElementById('eventTimer').style.display='none';}
function updateEventTimer(){if(!eventActive)return;const rem=Math.max(0,eventEndTime-Date.now());document.getElementById('eventCountdown').textContent=Math.ceil(rem/1000)+'с';if(rem<=0)endEvent();}
function startRainbowRain(){rainbowApples=[];rainbowInterval=setInterval(()=>{if(!eventActive||eventType!=='rainbow'){clearInterval(rainbowInterval);rainbowInterval=null;return;}const a={x:Math.floor(Math.random()*tileCount),y:0};if(!isOccupied(a))rainbowApples.push(a);for(let i=rainbowApples.length-1;i>=0;i--){rainbowApples[i].y++;if(rainbowApples[i].y>=tileCount){rainbowApples.splice(i,1);continue;}if(snake[0].x===rainbowApples[i].x&&snake[0].y===rainbowApples[i].y){score++;updateStat('applesEaten',1);updateStat('goldApplesEaten',1);sessionGoldApples++;scoreText.textContent='Счёт: '+score;currentSpeed=Math.max(40,baseSpeed-score*0.5);restartGameLoop();rainbowApples.splice(i,1);}}},300);}
function startAttackEvent(){attackBalls=[];for(let i=0;i<5;i++){const p={x:Math.floor(Math.random()*tileCount),y:Math.floor(Math.random()*tileCount)};attackBalls.push({x:p.x,y:p.y,dx:0,dy:0,active:true});if(Math.random()>0.5)attackBalls[i].dx=Math.random()>0.5?1:-1;else attackBalls[i].dy=Math.random()>0.5?1:-1;if(attackBalls[i].dx===0&&attackBalls[i].dy===0)attackBalls[i].dx=1;}attackInterval=setInterval(()=>{if(!eventActive||eventType!=='attack'){attackBalls.forEach(b=>{b.dx=0;b.dy=0;});return;}for(let b of attackBalls){if(!b.active)continue;const h=snake[0];if(Math.abs(h.x-b.x)>Math.abs(h.y-b.y)){b.dx=h.x>b.x?1:-1;b.dy=0;}else{b.dx=0;b.dy=h.y>b.y?1:-1;}if(Math.random()<0.2){if(b.dx!==0){b.dx=0;b.dy=Math.random()>0.5?1:-1;}else{b.dy=0;b.dx=Math.random()>0.5?1:-1;}}let nx=b.x+b.dx,ny=b.y+b.dy;if(nx<0||nx>=tileCount)b.dx*=-1;if(ny<0||ny>=tileCount)b.dy*=-1;b.x=Math.max(0,Math.min(tileCount-1,b.x+b.dx));b.y=Math.max(0,Math.min(tileCount-1,b.y+b.dy));}},200);}

function endGame(){
if(isGameOver)return;isGameOver=true;const s=getStats();s.deaths++;if(score>s.record)s.record=score;
if(!s.totalScore)s.totalScore=0;if(!s.totalGoldApples)s.totalGoldApples=0;if(!s.totalEvents)s.totalEvents=0;
s.totalScore+=score;s.totalGoldApples+=sessionGoldApples;s.totalEvents+=sessionEvents;
if(deathType==='self')s.selfDeaths=(s.selfDeaths||0)+1;if(deathType==='wall')s.wallDeaths=(s.wallDeaths||0)+1;
saveStats(s);updateStatsDisplay();updateSparkBalance();

// Отправка рекорда с проверкой скорости
if(currentUser){
const skinColor=getCurrentSkinColor();
const gameDuration=Math.floor((Date.now()-_st)/1000);
const maxScorePerSec=gameDuration>0?score/gameDuration:0;
const absoluteMax=16;
if(gameDuration>0&&maxScorePerSec>absoluteMax){s.record=Math.max(0,Math.floor(gameDuration*absoluteMax));saveStats(s);updateStatsDisplay();}
fetch('https://omrajmxjntinlzcdyufd.supabase.co/rest/v1/snake_leaderboard?username=eq.'+encodeURIComponent(currentUser.username),{method:'DELETE',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}}).then(()=>{return fetch('https://omrajmxjntinlzcdyufd.supabase.co/rest/v1/snake_leaderboard',{method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'},body:JSON.stringify({username:currentUser.username,score:s.record,gold_apples:s.totalGoldApples||0,events:s.totalEvents||0,deaths:s.deaths,skin_color:skinColor,created_at:new Date().toISOString()})});}).then(r=>{if(r&&r.status===201)loadLeaderboard();}).catch(e=>console.log('Рекорд сохранён локально'));
}

document.getElementById('gameOverScreen').style.display='flex';
document.getElementById('finalScore').textContent='Счёт: '+score;
document.getElementById('highScore').textContent='Рекорд: '+s.record;
endEvent();if(gameLoopInterval){clearInterval(gameLoopInterval);gameLoopInterval=null;}
checkAchievements(deathType);deathType=null;
}

function restartGame(){if(gameLoopInterval)clearInterval(gameLoopInterval);endEvent();attackBalls=[];snake=[{x:10,y:10}];food={x:5,y:5};bonusFoods=[];rainbowApples=[];goldenActive=false;dx=1;dy=0;score=0;isGameOver=false;currentSpeed=baseSpeed;sessionGoldApples=0;sessionEvents=0;manualEvent=false;deathType=null;_st=Date.now();scoreText.textContent="Счёт: 0";document.getElementById('gameOverScreen').style.display='none';document.getElementById('eventTimer').style.display='none';startGameLoop();}
function restartGameLoop(){if(gameLoopInterval)clearInterval(gameLoopInterval);startGameLoop();}
function startGameLoop(){if(gameLoopInterval)clearInterval(gameLoopInterval);_st=Date.now();gameLoopInterval=setInterval(drawGame,currentSpeed);}

document.addEventListener('keydown',e=>{
if(isGameOver)return;if(document.getElementById('modalOverlay').style.display==='flex')return;
const s=getSettings(),k=e.key.toLowerCase();
if(k===s.up){e.preventDefault();if(dy!==1){dx=0;dy=-1;}}
else if(k===s.down){e.preventDefault();if(dy!==-1){dx=0;dy=1;}}
else if(k===s.left){e.preventDefault();if(dx!==1){dx=-1;dy=0;}}
else if(k===s.right){e.preventDefault();if(dx!==-1){dx=1;dy=0;}}
if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)){e.preventDefault();if(!isGameOver){switch(e.key){case'ArrowUp':if(dy!==1){dx=0;dy=-1;}break;case'ArrowDown':if(dy!==-1){dx=0;dy=1;}break;case'ArrowLeft':if(dx!==1){dx=-1;dy=0;}break;case'ArrowRight':if(dx!==-1){dx=1;dy=0;}break;}}}
});

updateProfileUI();
updateStatsDisplay();
updateSparkBalance();
updateSparkButtons();
renderAchievements();
loadLeaderboard();
startGameLoop();
updateProfileUI();updateStatsDisplay();updateSparkBalance();updateSparkButtons();renderAchievements();loadLeaderboard();startGameLoop();
</script>
