<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Крестики-Нолики</title>
    <link rel="shortcut icon" href="img/crestici-noliki.png" type="image/x-icon">

<style>

    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: Arial;
        background: linear-gradient(135deg, #00b4d8, #0077b6);
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        transition: 0.3s;
    }

    body.dark-theme {
        background: linear-gradient(135deg, #1a1a2e, #16213e);
    }

    .top-panel {
        display: flex;
        gap: 15px;
        margin-top: 20px;
        margin-bottom: 10px;
        align-items: center;
        flex-wrap: wrap;
        justify-content: center;
    }

    .menu-btn {
        background: white;
        padding: 12px 25px;
        border-radius: 12px;
        cursor: pointer;
        font-size: 18px;
        transition: 0.2s;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        border: none;
        font-weight: bold;
    }

    body.dark-theme .menu-btn {
        background: #2a2a4a;
        color: #eee;
    }

    .menu-btn:hover {
        transform: translateY(-2px);
        background: #ececec;
    }

    body.dark-theme .menu-btn:hover {
        background: #3a3a5a;
    }

    .profile-section {
        display: flex;
        align-items: center;
        gap: 10px;
        background: white;
        padding: 8px 15px;
        border-radius: 25px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    body.dark-theme .profile-section {
        background: #2a2a4a;
        color: #eee;
    }

    .profile-avatar {
        font-size: 30px;
    }

    .profile-name {
        font-weight: bold;
        font-size: 18px;
        color: #333;
    }

    body.dark-theme .profile-name {
        color: #eee;
    }

    .profile-btn {
        background: #0077b6;
        color: white;
        border: none;
        padding: 8px 15px;
        border-radius: 15px;
        cursor: pointer;
        font-size: 14px;
        transition: 0.2s;
    }

    .profile-btn:hover {
        background: #005f8a;
    }

    .theme-toggle {
        background: white;
        border: none;
        padding: 10px 15px;
        border-radius: 25px;
        cursor: pointer;
        font-size: 20px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    body.dark-theme .theme-toggle {
        background: #2a2a4a;
    }

    .title {
        font-size: 40px;
        color: white;
        margin: 15px 0;
        font-weight: bold;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    /* Доска */
    .board {
        display: grid;
        grid-template-columns: repeat(3, 130px);
        grid-template-rows: repeat(3, 130px);
        gap: 10px;
        background: rgba(255,255,255,0.2);
        padding: 15px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        margin-bottom: 20px;
    }

    .cell {
        background: white;
        border-radius: 15px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: 0.2s;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    body.dark-theme .cell {
        background: #2a2a4a;
    }

    .cell:hover {
        transform: scale(1.05);
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .cell img {
        width: 80px;
        height: 80px;
        object-fit: contain;
        animation: popIn 0.3s ease;
    }

    @keyframes popIn {
        0% { transform: scale(0); }
        70% { transform: scale(1.1); }
        100% { transform: scale(1); }
    }

    /* Статус */
    #status {
        font-size: 30px;
        color: white;
        margin-bottom: 20px;
        font-weight: bold;
        display: flex;
        align-items: center;
        gap: 10px;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        min-height: 50px;
    }

    #status img {
        width: 40px;
        height: 40px;
        object-fit: contain;
    }

    /* Кнопка рестарта */
    .restart-btn {
        background: white;
        padding: 14px 30px;
        border-radius: 15px;
        cursor: pointer;
        font-size: 20px;
        transition: 0.2s;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        border: none;
        font-weight: bold;
        margin-bottom: 30px;
    }

    body.dark-theme .restart-btn {
        background: #2a2a4a;
        color: #eee;
    }

    .restart-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        background: #4CAF50;
        color: white;
    }

    /* Счёт */
    .score-panel {
        display: flex;
        gap: 30px;
        margin-bottom: 15px;
    }

    .score-item {
        background: white;
        padding: 12px 20px;
        border-radius: 15px;
        font-weight: bold;
        font-size: 18px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        display: flex;
        align-items: center;
        gap: 8px;
    }

    body.dark-theme .score-item {
        background: #2a2a4a;
        color: #eee;
    }

    .score-item img {
        width: 30px;
        height: 30px;
        object-fit: contain;
    }

    /* Модальное окно */
    .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.6);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 100;
    }

    .modal {
        background: white;
        border-radius: 20px;
        padding: 25px;
        min-width: 350px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        text-align: center;
        position: relative;
    }

    body.dark-theme .modal {
        background: #2a2a4a;
        color: #eee;
    }

    .modal h2 {
        margin: 0 0 15px 0;
        font-size: 26px;
    }

    .modal input {
        width: 100%;
        padding: 12px;
        border: 2px solid #ddd;
        border-radius: 10px;
        font-size: 16px;
        margin-bottom: 12px;
        outline: none;
    }

    body.dark-theme .modal input {
        background: #1a1a3a;
        border-color: #444;
        color: #eee;
    }

    .modal input:focus {
        border-color: #0077b6;
    }

    .modal-btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        font-size: 18px;
        cursor: pointer;
        margin-bottom: 8px;
        transition: 0.2s;
        font-weight: bold;
    }

    .btn-primary {
        background: #0077b6;
        color: white;
    }

    .btn-primary:hover {
        background: #005f8a;
    }

    .modal-switch {
        color: #0077b6;
        cursor: pointer;
        text-decoration: underline;
        font-size: 14px;
    }

    .modal-error {
        color: red;
        font-size: 14px;
        margin-bottom: 10px;
        display: none;
    }

    .modal-close {
        position: absolute;
        top: 10px;
        right: 15px;
        font-size: 24px;
        cursor: pointer;
        color: #999;
    }

    .modal-close:hover {
        color: #333;
    }

</style>
</head>
<body>

<!-- Модальное окно входа/регистрации -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modalLogin">
        <span class="modal-close" onclick="closeModal()">✕</span>
        <h2>🔐 Вход</h2>
        <input type="text" id="loginUsername" placeholder="Имя пользователя" maxlength="20">
        <input type="password" id="loginPassword" placeholder="Пароль" maxlength="30">
        <div class="modal-error" id="loginError">Неверное имя или пароль</div>
        <button class="modal-btn btn-primary" onclick="login()">Войти</button>
        <span class="modal-switch" onclick="switchModal('register')">Нет аккаунта? Зарегистрироваться</span>
    </div>

    <div class="modal" id="modalRegister">
        <span class="modal-close" onclick="closeModal()">✕</span>
        <h2>📝 Регистрация</h2>
        <input type="text" id="registerUsername" placeholder="Имя пользователя" maxlength="20">
        <input type="password" id="registerPassword" placeholder="Пароль" maxlength="30">
        <input type="password" id="registerPasswordConfirm" placeholder="Подтвердите пароль" maxlength="30">
        <div class="modal-error" id="registerError">Ошибка регистрации</div>
        <button class="modal-btn btn-primary" onclick="register()">Зарегистрироваться</button>
        <span class="modal-switch" onclick="switchModal('login')">Уже есть аккаунт? Войти</span>
    </div>
</div>

<div class="top-panel">
    <button class="menu-btn" onclick="window.location.href='main.html'">🏠 Главное меню</button>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle">🌙</button>
    
    <div class="profile-section" id="profileSection">
        <span class="profile-avatar">👤</span>
        <span class="profile-name" id="profileName">Гость</span>
        <button class="profile-btn" id="profileBtn" onclick="openAuthModal()">Войти</button>
    </div>
</div>

<div class="title">❌ Крестики-Нолики ⭕</div>

<!-- Счёт -->
<div class="score-panel">
    <div class="score-item">
        <img src="img/crestic.png" alt="X">
        <span id="scoreX">0</span>
    </div>
    <div class="score-item">
        Ничья: <span id="scoreDraw">0</span>
    </div>
    <div class="score-item">
        <img src="img/nolik.png" alt="O">
        <span id="scoreO">0</span>
    </div>
</div>

<!-- Доска -->
<div class="board">
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
</div>

<div id="status"></div>

<button class="restart-btn" onclick="restartGame()">Рестарт 🔄</button>

<script>

// ========== ТЁМНАЯ ТЕМА ==========
let darkTheme = localStorage.getItem('snakeDarkTheme') === 'true';
if (darkTheme) document.body.classList.add('dark-theme');
updateThemeButton();

function toggleTheme() {
    darkTheme = !darkTheme;
    localStorage.setItem('snakeDarkTheme', darkTheme);
    if (darkTheme) document.body.classList.add('dark-theme');
    else document.body.classList.remove('dark-theme');
    updateThemeButton();
}

function updateThemeButton() {
    document.getElementById('themeToggle').textContent = darkTheme ? '☀️' : '🌙';
}

// ========== СИСТЕМА АККАУНТОВ ==========
let currentUser = JSON.parse(localStorage.getItem('snakeCurrentUser')) || null;

function updateProfileUI() {
    if (currentUser) {
        document.getElementById('profileName').textContent = currentUser.username;
        document.getElementById('profileBtn').textContent = 'Выйти';
        document.getElementById('profileBtn').onclick = logout;
        document.getElementById('profileSection').querySelector('.profile-avatar').textContent = '🎮';
    } else {
        document.getElementById('profileName').textContent = 'Гость';
        document.getElementById('profileBtn').textContent = 'Войти';
        document.getElementById('profileBtn').onclick = openAuthModal;
        document.getElementById('profileSection').querySelector('.profile-avatar').textContent = '👤';
    }
}

function openAuthModal() {
    if (currentUser) { logout(); return; }
    document.getElementById('modalOverlay').style.display = 'flex';
    document.getElementById('modalLogin').style.display = 'block';
    document.getElementById('modalRegister').style.display = 'none';
    document.getElementById('loginError').style.display = 'none';
    document.getElementById('registerError').style.display = 'none';
    document.getElementById('loginUsername').value = '';
    document.getElementById('loginPassword').value = '';
    document.getElementById('registerUsername').value = '';
    document.getElementById('registerPassword').value = '';
    document.getElementById('registerPasswordConfirm').value = '';
}

function closeModal() {
    document.getElementById('modalOverlay').style.display = 'none';
}

function switchModal(type) {
    document.getElementById('loginError').style.display = 'none';
    document.getElementById('registerError').style.display = 'none';
    if (type === 'register') {
        document.getElementById('modalLogin').style.display = 'none';
        document.getElementById('modalRegister').style.display = 'block';
    } else {
        document.getElementById('modalLogin').style.display = 'block';
        document.getElementById('modalRegister').style.display = 'none';
    }
}

function getAllUsers() {
    return JSON.parse(localStorage.getItem('snakeUsers')) || {};
}

function saveUsers(users) {
    // Сначала получаем ТЕКУЩИЕ данные из localStorage
    const currentUsers = JSON.parse(localStorage.getItem('snakeUsers') || '{}');
    // Объединяем с новыми данными (новые перезаписывают старые)
    const merged = Object.assign({}, currentUsers, users);
    localStorage.setItem('snakeUsers', JSON.stringify(merged));
}

function register() {
    const username = document.getElementById('registerUsername').value.trim();
    const password = document.getElementById('registerPassword').value;
    const passwordConfirm = document.getElementById('registerPasswordConfirm').value;
    const errorEl = document.getElementById('registerError');
    errorEl.style.display = 'none';
    
    if (!username || !password) {
        errorEl.textContent = 'Заполните все поля'; errorEl.style.display = 'block'; return;
    }
    if (username.length < 3) {
        errorEl.textContent = 'Имя должно быть не менее 3 символов'; errorEl.style.display = 'block'; return;
    }
    if (password.length < 4) {
        errorEl.textContent = 'Пароль должен быть не менее 4 символов'; errorEl.style.display = 'block'; return;
    }
    if (password !== passwordConfirm) {
        errorEl.textContent = 'Пароли не совпадают'; errorEl.style.display = 'block'; return;
    }
    
    const users = getAllUsers();
    if (users[username]) {
        errorEl.textContent = 'Пользователь с таким именем уже существует'; errorEl.style.display = 'block'; return;
    }
    
    users[username] = {
        password: password,
        stats: { deaths: 0, record: 0, eventsEncountered: 0, applesEaten: 0, goldApplesEaten: 0, totalScore: 0, totalGoldApples: 0, totalEvents: 0, bonusEvents: 0, rainbowEvents: 0, goldenEvents: 0, attackEvents: 0, selfDeaths: 0, wallDeaths: 0 },
        sparks: { golden: 0, rainbow: 0, bonus: 0, random: 0 },
        ownedSkins: ['green'],
        selectedSkin: 'green',
        settings: { up: 'w', down: 's', left: 'a', right: 'd', sparkGolden: '1', sparkRainbow: '2', sparkBonus: '3', sparkRandom: '4', buySpark: 'b' },
        achievements: {},
        tictactoe: { winsX: 0, winsO: 0, draws: 0 },
        created: Date.now()
    };
    
    saveUsers(users);
    
    currentUser = {
        username: username,
        stats: users[username].stats,
        sparks: users[username].sparks,
        ownedSkins: users[username].ownedSkins,
        selectedSkin: users[username].selectedSkin,
        settings: users[username].settings,
        achievements: users[username].achievements
    };
    localStorage.setItem('snakeCurrentUser', JSON.stringify(currentUser));
    
    closeModal();
    updateProfileUI();
}

function login() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;
    const errorEl = document.getElementById('loginError');
    errorEl.style.display = 'none';
    
    if (!username || !password) {
        errorEl.textContent = 'Заполните все поля'; errorEl.style.display = 'block'; return;
    }
    
    const users = getAllUsers();
    if (!users[username]) {
        errorEl.textContent = 'Пользователь не найден'; errorEl.style.display = 'block'; return;
    }
    if (users[username].password !== password) {
        errorEl.textContent = 'Неверный пароль'; errorEl.style.display = 'block'; return;
    }
    
    if (!users[username].sparks) users[username].sparks = { golden: 0, rainbow: 0, bonus: 0, random: 0 };
    if (!users[username].ownedSkins) users[username].ownedSkins = ['green'];
    if (!users[username].selectedSkin) users[username].selectedSkin = 'green';
    if (!users[username].settings) users[username].settings = { up: 'w', down: 's', left: 'a', right: 'd', sparkGolden: '1', sparkRainbow: '2', sparkBonus: '3', sparkRandom: '4', buySpark: 'b' };
    if (!users[username].achievements) users[username].achievements = {};
    if (!users[username].tictactoe) users[username].tictactoe = { winsX: 0, winsO: 0, draws: 0 };
    
    currentUser = {
        username: username,
        stats: users[username].stats,
        sparks: users[username].sparks,
        ownedSkins: users[username].ownedSkins,
        selectedSkin: users[username].selectedSkin,
        settings: users[username].settings,
        achievements: users[username].achievements
    };
    localStorage.setItem('snakeCurrentUser', JSON.stringify(currentUser));
    
    closeModal();
    updateProfileUI();
}

function logout() {
    if (confirm('Выйти из аккаунта?')) {
        currentUser = null;
        localStorage.removeItem('snakeCurrentUser');
        updateProfileUI();
    }
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});

// ========== ИГРА КРЕСТИКИ-НОЛИКИ ==========
const cells = document.querySelectorAll('.cell');
const statusText = document.getElementById('status');

let currentPlayer = 'X';
let gameActive = true;

const images = {
    X: 'img/crestic.png',
    O: 'img/nolik.png'
};

const board = ["", "", "", "", "", "", "", "", ""];

const winPatterns = [
    [0,1,2], [3,4,5], [6,7,8],
    [0,3,6], [1,4,7], [2,5,8],
    [0,4,8], [2,4,6]
];

updateTurnText();
loadScores();

cells.forEach((cell, index) => {
    cell.addEventListener('click', () => {
        if (board[index] !== "" || !gameActive) return;

        board[index] = currentPlayer;
        cell.innerHTML = `<img src="${images[currentPlayer]}">`;

        checkWinner();

        if (!gameActive) return;

        currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
        updateTurnText();
    });
});

function updateTurnText() {
    statusText.innerHTML = `Ход: <img src="${images[currentPlayer]}">`;
}

function checkWinner() {
    for (let pattern of winPatterns) {
        const [a, b, c] = pattern;
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
            statusText.innerHTML = `Победил <img src="${images[board[a]]}"> 🎉`;
            gameActive = false;
            updateScore(board[a]);
            return;
        }
    }

    if (!board.includes("")) {
        statusText.innerHTML = `Ничья 🤝`;
        gameActive = false;
        updateScore('draw');
    }
}

function updateScore(winner) {
    const users = getAllUsers();
    const username = currentUser ? currentUser.username : 'guest';
    
    if (!users[username]) users[username] = { tictactoe: { winsX: 0, winsO: 0, draws: 0 } };
    if (!users[username].tictactoe) users[username].tictactoe = { winsX: 0, winsO: 0, draws: 0 };
    
    if (winner === 'X') users[username].tictactoe.winsX++;
    else if (winner === 'O') users[username].tictactoe.winsO++;
    else users[username].tictactoe.draws++;
    
    saveUsers(users);
    loadScores();
}

function loadScores() {
    const users = getAllUsers();
    const username = currentUser ? currentUser.username : 'guest';
    const scores = (users[username] && users[username].tictactoe) || { winsX: 0, winsO: 0, draws: 0 };
    
    document.getElementById('scoreX').textContent = scores.winsX;
    document.getElementById('scoreO').textContent = scores.winsO;
    document.getElementById('scoreDraw').textContent = scores.draws;
}

function restartGame() {
    board.fill("");
    cells.forEach(cell => cell.innerHTML = "");
    currentPlayer = 'X';
    gameActive = true;
    updateTurnText();
}

// ========== ЗАПУСК ==========
updateProfileUI();

</script>
</body>
</html>
